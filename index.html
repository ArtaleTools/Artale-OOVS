<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artale 表攻與技能差距比對系統</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a24;
            color: #f5f5f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h2 {
            color: #4db8ff;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }
        .main-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            width: 100%;
            max-width: 1000px;
            justify-content: center;
        }
        .panel {
            background-color: #2b2b36;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            flex: 1;
            min-width: 300px;
        }
        .panel h3 {
            margin-top: 0;
            color: #fff;
            border-bottom: 2px solid #4db8ff;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .right-panel h3 {
            border-bottom: 2px solid #ff4d4d;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #cccccc;
            font-size: 0.9em;
        }
        input[type="number"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #444;
            border-radius: 6px;
            background-color: #3b3b4a;
            color: #fff;
            font-size: 1em;
            box-sizing: border-box;
        }
        input[type="number"]:focus, select:focus {
            outline: none;
            border-color: #4db8ff;
        }
        .right-panel input:focus, .right-panel select:focus {
            border-color: #ff4d4d;
        }
        .skills-list {
            background-color: #1e1e24;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            border-left: 4px solid #4db8ff;
            font-size: 0.9em;
        }
        .skills-list ul {
            margin: 10px 0 0 0;
            padding-left: 20px;
            color: #aaa;
        }
        .skills-list li {
            margin-bottom: 5px;
        }
        button {
            width: 100%;
            max-width: 1000px;
            padding: 16px;
            background-color: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 20px;
            letter-spacing: 1px;
        }
        button:hover {
            background-color: #45a049;
        }
        .result-panel {
            background-color: #2b2b36;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 1000px;
            margin-top: 30px;
            display: none;
            box-sizing: border-box;
        }
        .result-panel.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }
        .diff-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-box {
            flex: 1;
            background-color: #1e1e24;
            padding: 15px;
            border-radius: 8px;
            min-width: 250px;
            text-align: center;
        }
        .win { color: #4CAF50; font-weight: bold; }
        .lose { color: #F44336; font-weight: bold; }
        .chart-container {
            position: relative;
            height: 400px;
            width: 100%;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <h2>Artale 雙職業表攻與技能差距比對圖</h2>

    <div class="main-container">
        <div class="panel">
            <h3>我的能力值配置</h3>
            <div class="form-group">
                <label>我的職業</label>
                <select id="myClass">
                    <option value="槍神">槍神 (Corsair)</option>
                    <option value="箭神">箭神 (Bowmaster)</option>
                </select>
            </div>
            <div class="form-group">
                <label>小表 (最低表攻)</label>
                <input type="number" id="myMin" placeholder="例: 3429" required>
            </div>
            <div class="form-group">
                <label>大表 (最高表攻)</label>
                <input type="number" id="myMax" placeholder="例: 6228" required>
            </div>

            <div class="skills-list">
                <strong style="color: #4db8ff;">綁定計算的技能組合：</strong>
                <ul>
                    <li>火槍</li>
                    <li>章魚</li>
                    <li>加農砲模式 (3速13下)</li>
                    <li>迅雷模式</li>
                </ul>
            </div>
        </div>

        <div class="panel right-panel">
            <h3>對手能力值配置</h3>
            <div class="form-group">
                <label>對象職業</label>
                <select id="targetClass">
                    <option value="箭神">箭神 (Bowmaster)</option>
                    <option value="槍神">槍神 (Corsair)</option>
                </select>
            </div>
            <div class="form-group">
                <label>對手小表 (最低表攻)</label>
                <input type="number" id="targetMin" placeholder="請輸入對手小表" required>
            </div>
            <div class="form-group">
                <label>對手大表 (最高表攻)</label>
                <input type="number" id="targetMax" placeholder="請輸入對手大表" required>
            </div>
        </div>
    </div>

    <button onclick="generateComparison()">產生比對圖與數據</button>

    <div class="result-panel" id="resultPanel">
        <div class="diff-stats" id="diffStatsContent">
            </div>
        <div class="chart-container">
            <canvas id="comparisonChart"></canvas>
        </div>
    </div>

    <script>
        let chartInstance = null;

        function generateComparison() {
            // 獲取輸入值
            const myMin = parseFloat(document.getElementById('myMin').value);
            const myMax = parseFloat(document.getElementById('myMax').value);
            const targetMin = parseFloat(document.getElementById('targetMin').value);
            const targetMax = parseFloat(document.getElementById('targetMax').value);
            const myClass = document.getElementById('myClass').value;
            const targetClass = document.getElementById('targetClass').value;

            if (isNaN(myMin) || isNaN(myMax) || isNaN(targetMin) || isNaN(targetMax)) {
                alert("請確保所有大表與小表的欄位都已填入數字！");
                return;
            }

            // 計算差距 (對手 - 自己)
            const minDiff = targetMin - myMin;
            const maxDiff = targetMax - myMax;
            
            // 計算百分比 (以自己的能力值為基準分母)
            const minPct = myMin > 0 ? ((minDiff / myMin) * 100).toFixed(2) : 0;
            const maxPct = myMax > 0 ? ((maxDiff / myMax) * 100).toFixed(2) : 0;

            // 格式化輸出文字
            function formatResult(diff, pct) {
                if (diff > 0) {
                    return `對手勝出 <span class="lose">${diff.toLocaleString()}</span> (贏 <span class="lose">+${pct}%</span>)`;
                } else if (diff < 0) {
                    return `你勝出 <span class="win">${Math.abs(diff).toLocaleString()}</span> (贏 <span class="win">${Math.abs(pct)}%</span>)`;
                } else {
                    return `完全平手 (0%)`;
                }
            }

            const statsHtml = `
                <div class="stat-box">
                    <h4 style="margin-top:0; color:#ccc;">【小表差距】</h4>
                    <div>我的: <strong>${myMin.toLocaleString()}</strong> vs 對手: <strong>${targetMin.toLocaleString()}</strong></div>
                    <div style="margin-top:10px; font-size:1.1em;">${formatResult(minDiff, minPct)}</div>
                </div>
                <div class="stat-box">
                    <h4 style="margin-top:0; color:#ccc;">【大表差距】</h4>
                    <div>我的: <strong>${myMax.toLocaleString()}</strong> vs 對手: <strong>${targetMax.toLocaleString()}</strong></div>
                    <div style="margin-top:10px; font-size:1.1em;">${formatResult(maxDiff, maxPct)}</div>
                </div>
            `;
            
            document.getElementById('diffStatsContent').innerHTML = statsHtml;
            document.getElementById('resultPanel').classList.add('active');

            // 繪製 Chart.js 圖表
            const ctx = document.getElementById('comparisonChart').getContext('2d');
            
            // 如果已有圖表，先銷毀才能重繪
            if (chartInstance) {
                chartInstance.destroy();
            }

            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['小表 (最低表攻)', '大表 (最高表攻)'],
                    datasets: [
                        {
                            label: `我的數值 (${myClass})`,
                            data: [myMin, myMax],
                            backgroundColor: 'rgba(77, 184, 255, 0.8)',
                            borderColor: 'rgba(77, 184, 255, 1)',
                            borderWidth: 1,
                            borderRadius: 4
                        },
                        {
                            label: `對手數值 (${targetClass})`,
                            data: [targetMin, targetMax],
                            backgroundColor: 'rgba(255, 77, 77, 0.8)',
                            borderColor: 'rgba(255, 77, 77, 1)',
                            borderWidth: 1,
                            borderRadius: 4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: { color: '#f5f5f6', font: { size: 14 } }
                        },
                        title: {
                            display: true,
                            text: '雙方雪表數值直觀比對',
                            color: '#fff',
                            font: { size: 18 }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { color: '#ccc' },
                            grid: { color: '#444' }
                        },
                        x: {
                            ticks: { color: '#ccc', font: { size: 14 } },
                            grid: { display: false }
                        }
                    }
                }
            });
            
            // 自動往下滾動到結果區塊
            setTimeout(() => {
                document.getElementById('resultPanel').scrollIntoView({ behavior: 'smooth' });
            }, 100);
        }
    </script>

</body>
</html>
