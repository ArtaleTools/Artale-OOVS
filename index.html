<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artale OOVS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a24; color: #f5f5f6; margin: 0; padding: 30px 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        h2 { color: #4db8ff; letter-spacing: 2px; margin-bottom: 10px; text-align: center; }
        .update-time { color: #888; font-size: 0.9em; text-align: center; margin-top: 0; margin-bottom: 30px; letter-spacing: 1px; }
        
        .main-container {
            display: flex; flex-wrap: wrap; gap: 30px; width: 100%; max-width: 1000px; justify-content: center;
        }
        .panel {
            background-color: #2b2b36; padding: 25px; border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4); flex: 1; min-width: 320px;
        }
        .panel-left { border-top: 5px solid #4db8ff; }
        .panel-right { border-top: 5px solid #ff4d4d; }
        .panel h3 { margin-top: 0; color: #fff; border-bottom: 1px solid #444; padding-bottom: 15px; margin-bottom: 20px; }
        
        .form-group { margin-bottom: 20px; }
        .flex-row { display: flex; gap: 15px; margin-bottom: 20px; }
        .flex-row .form-group { flex: 1; margin-bottom: 0; }

        label { display: block; margin-bottom: 8px; color: #ccc; font-weight: bold; font-size: 0.95em; position: relative; }
        .edit-link { 
            color: #ffd700; font-size: 0.85em; text-decoration: none; 
            background-color: #3b3b4a; padding: 2px 8px; border-radius: 4px;
            margin-left: 10px; display: none; transition: 0.2s;
        }
        .edit-link:hover { background-color: #4a4a5a; }

        input[type="number"], select {
            width: 100%; padding: 12px; border: 1px solid #444; border-radius: 6px;
            background-color: #3b3b4a; color: #fff; font-size: 1.05em; box-sizing: border-box;
        }
        input:focus, select:focus { outline: none; border-color: #4db8ff; }
        .panel-right input:focus, .panel-right select:focus { border-color: #ff4d4d; }

        .checkbox-group { margin-bottom: 12px; }
        .checkbox-group label {
            display: flex; align-items: center; cursor: pointer; color: #ffcc00; font-size: 1.05em;
            background-color: #3b3b4a; padding: 10px 12px; border-radius: 6px; border: 1px solid #555;
            transition: 0.2s;
        }
        .checkbox-group label.si-label { color: #4db8ff; }
        .checkbox-group label:hover { background-color: #454555; }
        .checkbox-group input[type="checkbox"] {
            width: 20px; height: 20px; margin-right: 10px; cursor: pointer;
        }

        .result-panel {
            background-color: #2b2b36; padding: 30px; border-radius: 12px; width: 100%; max-width: 1000px;
            margin-top: 30px; box-sizing: border-box; text-align: center;
        }
        
        .diff-text { font-size: 1.5em; margin-bottom: 20px; }
        .win { color: #4CAF50; font-weight: bold;}
        .lose { color: #ff4d4d; font-weight: bold;}
        
        .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; text-align: left; }
        .detail-box { background-color: #1e1e24; padding: 20px; border-radius: 8px; border-left: 4px solid #4db8ff; }
        .detail-box.right { border-left: 4px solid #ff4d4d; }
        .detail-box h4 { margin: 0 0 10px 0; color: #fff; font-size: 1.2em;}
        .detail-box p { margin: 8px 0; color: #ccc; line-height: 1.5; }
        .highlight { color: #ffd700; font-weight: bold; font-size: 1.2em; }
        .sub-text { color: #888; font-size: 0.85em; }
        
        .equiv-box {
            background-color: #1e1e24; padding: 20px; border-radius: 8px; margin-bottom: 30px;
            border: 1px dashed #ffd700; text-align: center; display: none;
        }
        .equiv-box p { margin: 8px 0; font-size: 1.1em; color: #ddd; }
        .equiv-box .eq-val { color: #ffd700; font-weight: bold; font-size: 1.3em; }
        .gap-val { color: #ff6b6b; font-size: 0.95em; margin-top: 4px !important; }

        .chart-container { position: relative; height: 350px; width: 100%; }
    </style>
</head>
<body>

    <h2>Artale OOVS</h2>
    <p class="update-time">最後更新時間：2026-04-06 10:10</p>

    <div class="main-container">
        <div class="panel panel-left">
            <h3>玩家 A 配置</h3>
            <div class="form-group">
                <label>選擇輸出模式 <a href="#" class="edit-link" id="p1Edit" onclick="promptLevel('p1'); return false;">⚙️ 修改精準等級</a></label>
                <select id="p1Mode" onchange="handleModeChange('p1')">
                    <optgroup label="夜使者 (Night Lord)">
                        <option value="nl_tt">三飛閃20 + 影分身 + 無形鏢</option>
                    </optgroup>
                    <optgroup label="英雄 (Hero)">
                        <option value="hero_brandish">無雙劍舞30 260% + 進階鬥氣滿215%</option>
                    </optgroup>
                    <optgroup label="槍神 (Corsair)">
                        <option value="cs_rf">純迅雷</option>
                        <option value="cs_rf_octo">迅雷 + 4隻章魚</option>
                        <option value="cs_rf_octo_hm">迅雷 + 4隻章魚 + 精準[數值]</option>
                        <option value="cs_cannon">純加農砲</option>
                        <option value="cs_cannon_octo">純加農砲 + 4隻章魚</option>
                        <option value="cs_cannon_octo_hm">純加農砲 + 4隻章魚 + 精準[數值]</option>
                    </optgroup>
                    <optgroup label="箭神 (Bowmaster)">
                        <option value="bm_rf">純暴風神射</option>
                        <option value="bm_rf_ph">暴風神射 + 鳳凰</option>
                    </optgroup>
                </select>
            </div>
            
            <div class="form-group" id="p1MainLvlGroup" style="display:none;">
                <label>主技能等級 (1~30) <span style="color:#ffcc00; font-weight:normal;">*影響倍率*</span></label>
                <input type="number" id="p1MainLvl" value="30" min="1" max="30" oninput="executeCalculation()">
            </div>
            
            <div class="form-group" id="p1SummonLvlGroup" style="display:none;">
                <label>鳳凰技能等級 (1~30) <span style="color:#ffcc00; font-weight:normal;">*影響倍率*</span></label>
                <input type="number" id="p1SummonLvl" value="30" min="1" max="30" oninput="executeCalculation()">
            </div>

            <div class="flex-row">
                <div class="form-group">
                    <label>等級調節 (-1, +2...)</label>
                    <input type="number" id="p1LevelDiff" value="0" oninput="executeCalculation()">
                </div>
                <div class="form-group">
                    <label>總武器攻擊力</label>
                    <input type="number" id="p1WeaponAtt" value="122" oninput="executeCalculation()">
                </div>
            </div>

            <div class="flex-row">
                <div class="form-group">
                    <label>主技能小表 (Min)</label>
                    <input type="number" id="p1Min" value="2942" oninput="executeCalculation()">
                </div>
                <div class="form-group">
                    <label>主技能大表 (Max)</label>
                    <input type="number" id="p1Max" value="5286" oninput="executeCalculation()">
                </div>
            </div>
            
            <div class="form-group checkbox-group" id="p1SEGroup">
                <label><input type="checkbox" id="p1SE" onchange="executeCalculation()"> 💡 會心之眼30 (爆率+15%, 爆傷+140%)</label>
            </div>
            <div class="form-group checkbox-group" id="p1SIGroup">
                <label class="si-label"><input type="checkbox" id="p1SI" onchange="executeCalculation()"> ⚡ 最終極速 (依職業動態套用增幅)</label>
            </div>
        </div>

        <div class="panel panel-right">
            <h3>玩家 B 配置</h3>
            <div class="form-group">
                <label>選擇輸出模式 <a href="#" class="edit-link" id="p2Edit" onclick="promptLevel('p2'); return false;">⚙️ 修改精準等級</a></label>
                <select id="p2Mode" onchange="handleModeChange('p2')">
                    <optgroup label="箭神 (Bowmaster)">
                        <option value="bm_rf" selected>純暴風神射</option>
                        <option value="bm_rf_ph">暴風神射 + 鳳凰</option>
                    </optgroup>
                    <optgroup label="夜使者 (Night Lord)">
                        <option value="nl_tt">三飛閃20 + 影分身 + 無形鏢</option>
                    </optgroup>
                    <optgroup label="槍神 (Corsair)">
                        <option value="cs_rf">純迅雷</option>
                        <option value="cs_rf_octo">迅雷 + 4隻章魚</option>
                        <option value="cs_rf_octo_hm">迅雷 + 4隻章魚 + 精準[數值]</option>
                        <option value="cs_cannon">純加農砲</option>
                        <option value="cs_cannon_octo">純加農砲 + 4隻章魚</option>
                        <option value="cs_cannon_octo_hm">純加農砲 + 4隻章魚 + 精準[數值]</option>
                    </optgroup>
                    <optgroup label="英雄 (Hero)">
                        <option value="hero_brandish">無雙劍舞30 260% + 進階鬥氣滿215%</option>
                    </optgroup>
                </select>
            </div>

            <div class="form-group" id="p2MainLvlGroup">
                <label>主技能等級 (1~30) <span style="color:#ffcc00; font-weight:normal;">*影響倍率*</span></label>
                <input type="number" id="p2MainLvl" value="30" min="1" max="30" oninput="executeCalculation()">
            </div>
            
            <div class="form-group" id="p2SummonLvlGroup" style="display:none;">
                <label>鳳凰技能等級 (1~30) <span style="color:#ffcc00; font-weight:normal;">*影響倍率*</span></label>
                <input type="number" id="p2SummonLvl" value="30" min="1" max="30" oninput="executeCalculation()">
            </div>

            <div class="flex-row">
                <div class="form-group">
                    <label>等級調節 (-1, +2...)</label>
                    <input type="number" id="p2LevelDiff" value="0" oninput="executeCalculation()">
                </div>
                <div class="form-group">
                    <label>總武器攻擊力</label>
                    <input type="number" id="p2WeaponAtt" value="156" oninput="executeCalculation()">
                </div>
            </div>

            <div class="flex-row">
                <div class="form-group">
                    <label>主技能小表 (Min)</label>
                    <input type="number" id="p2Min" value="5225" oninput="executeCalculation()">
                </div>
                <div class="form-group">
                    <label>主技能大表 (Max)</label>
                    <input type="number" id="p2Max" value="6407" oninput="executeCalculation()">
                </div>
            </div>
            
            <div class="form-group checkbox-group" id="p2SEGroup" style="display:none;">
                <label><input type="checkbox" id="p2SE" onchange="executeCalculation()"> 💡 會心之眼30 (爆率+15%, 爆傷+140%)</label>
            </div>
            <div class="form-group checkbox-group" id="p2SIGroup">
                <label class="si-label"><input type="checkbox" id="p2SI" onchange="executeCalculation()"> ⚡ 最終極速 (依職業動態套用增幅)</label>
            </div>
        </div>
    </div>

    <div class="result-panel" id="resultPanel">
        <div class="diff-text" id="diffText"></div>
        
        <div class="details-grid">
            <div class="detail-box" id="p1Detail"></div>
            <div class="detail-box right" id="p2Detail"></div>
        </div>

        <div class="equiv-box" id="equivBox"></div>

        <div class="chart-container">
            <canvas id="dpmChart"></canvas>
        </div>
    </div>

    <script>
        let p1HmLevel = 20;
        let p2HmLevel = 20;

        let currentClass = { p1: 'nl', p2: 'bm' };

        function updateVisibility(player) {
            const mode = document.getElementById(player + 'Mode').value;
            const editBtn = document.getElementById(player + 'Edit');
            const mainLvlGroup = document.getElementById(player + 'MainLvlGroup');
            const summonLvlGroup = document.getElementById(player + 'SummonLvlGroup');
            const seGroup = document.getElementById(player + 'SEGroup');

            editBtn.style.display = mode.endsWith('_hm') ? 'inline-block' : 'none';
            summonLvlGroup.style.display = (mode === 'bm_rf_ph') ? 'block' : 'none';

            if (mode.startsWith('hero_') || mode.startsWith('nl_')) {
                mainLvlGroup.style.display = 'none';
            } else {
                mainLvlGroup.style.display = 'block';
            }

            if (mode.startsWith('bm_')) {
                seGroup.style.display = 'none';
            } else {
                seGroup.style.display = 'block';
            }
        }

        function handleModeChange(player) {
            const selectEl = document.getElementById(player + 'Mode');
            const mode = selectEl.value;
            
            const newClassPrefix = mode.split('_')[0]; 
            if (newClassPrefix !== currentClass[player]) {
                const minEl = document.getElementById(player + 'Min');
                const maxEl = document.getElementById(player + 'Max');
                const weaponAttEl = document.getElementById(player + 'WeaponAtt');
                
                if (newClassPrefix === 'cs') {
                    minEl.value = 3429; maxEl.value = 6228; weaponAttEl.value = 142;
                } else if (newClassPrefix === 'bm') {
                    minEl.value = 5225; maxEl.value = 6407; weaponAttEl.value = 156;
                } else if (newClassPrefix === 'hero') {
                    minEl.value = 4808; maxEl.value = 8789; weaponAttEl.value = 149;
                } else if (newClassPrefix === 'nl') {
                    minEl.value = 2942; maxEl.value = 5286; weaponAttEl.value = 122;
                }
                currentClass[player] = newClassPrefix;
            }

            updateVisibility(player);

            Array.from(selectEl.options).forEach(opt => {
                if (opt.value.endsWith('_hm')) {
                    opt.text = opt.text.replace(/精準\[\d+\]/, '精準[數值]');
                }
            });

            if (mode.endsWith('_hm')) {
                promptLevel(player); 
            } else {
                executeCalculation(); 
            }
        }

        function promptLevel(player) {
            const selectEl = document.getElementById(player + 'Mode');
            let currentLvl = player === 'p1' ? p1HmLevel : p2HmLevel;
            let val = prompt("請輸入精準目標等級 (1~20):", currentLvl);
            
            if (val !== null && val.trim() !== "") {
                let lvl = parseInt(val, 10);
                if (!isNaN(lvl)) {
                    if (lvl < 1) lvl = 1;
                    if (lvl > 20) lvl = 20;
                    if (player === 'p1') p1HmLevel = lvl;
                    else p2HmLevel = lvl;
                }
            }
            
            currentLvl = player === 'p1' ? p1HmLevel : p2HmLevel;
            const optionEl = selectEl.options[selectEl.selectedIndex];
            optionEl.text = optionEl.text.replace(/精準\[\d+\]|精準\[數值\]/, `精準[${currentLvl}]`);
            
            executeCalculation(); 
        }

        function getRfPercent(lvl) {
            lvl = Math.max(1, Math.min(30, lvl));
            if (lvl <= 10) return 100 + lvl * 2;       
            if (lvl <= 20) return 142 + (lvl - 11) * 2; 
            return 182 + (lvl - 21) * 2;               
        }

        function getCannonPercent(lvl) {
            lvl = Math.max(1, Math.min(30, lvl));
            return Math.min(380, 265 + (lvl - 1) * 5); 
        }

        function getBmRfPercent(lvl) {
            lvl = Math.max(1, Math.min(30, lvl));
            return 80 + lvl;                           
        }

        function getPhoenixPercent(lvl) {
            lvl = Math.max(1, Math.min(30, lvl));
            if (lvl <= 10) return 300 + lvl * 5;           
            if (lvl <= 20) return 400 + (lvl - 10) * 5;    
            return 500 + (lvl - 20) * 5;                   
        }

        const CS_BASE_AVG = 4828.5;
        const HERO_BASE_AVG = 6798.5; 
        const NL_BASE_AVG = 4114; 

        const BM_MODES = {
            'bm_rf': { name: "純暴風神射", hasPhoenix: false },
            'bm_rf_ph': { name: "暴風神射 + 鳳凰", hasPhoenix: true }
        };

        const CS_NAMES = {
            'cs_rf': "純迅雷",
            'cs_rf_octo': "迅雷 + 4隻章魚",
            'cs_rf_octo_hm': "迅雷 + 4隻章魚 + 精準目標",
            'cs_cannon': "純加農砲",
            'cs_cannon_octo': "純加農砲 + 4隻章魚",
            'cs_cannon_octo_hm': "純加農砲 + 4隻章魚 + 精準目標"
        };

        function getCorsairBaseDpm(modeKey, skillLvl, hmLevel) {
            let mainBase = 0;
            let mainHm20 = 0;
            let summonBase = 0;
            let skillPct = 0;

            if (modeKey.includes('rf')) {
                skillPct = getRfPercent(skillLvl);
                mainBase = 4195980 * (skillPct / 200);   
                mainHm20 = 5004963 * (skillPct / 200); 
            } else if (modeKey.includes('cannon')) {
                skillPct = getCannonPercent(skillLvl);
                mainBase = 6074286 * (skillPct / 380);   
                mainHm20 = 6453882 * (skillPct / 380);
            }

            if (modeKey.includes('octo')) {
                summonBase = 3756450;
            }

            let currentMainBase = mainBase;
            if (modeKey.includes('hm')) {
                hmLevel = Math.max(1, Math.min(20, hmLevel || 20));
                currentMainBase = mainBase + ((mainHm20 - mainBase) * (hmLevel / 20));
            }

            return { currentMainBase, summonBase, skillPct, mainBase };
        }

        function getAdjustedRange(min, max, mode, levelDiff, weaponAtt) {
            if (levelDiff === 0 || weaponAtt <= 0) return { adjMin: min, adjMax: max, rangeDiff: 0 };

            let classMultiplier = 3.6; 
            if (mode.startsWith('bm_')) classMultiplier = 3.4;
            if (mode.startsWith('hero_')) classMultiplier = 4.0;

            const statDiff = levelDiff * 5 * 1.09; 
            const rangeDiff = statDiff * classMultiplier * (weaponAtt / 100);

            const ratio = max !== 0 ? (min / max) : 0;
            const adjMax = Math.max(0, max + rangeDiff);
            const adjMin = Math.max(0, min + (rangeDiff * ratio)); 

            return { adjMin: Math.round(adjMin), adjMax: Math.round(adjMax), rangeDiff: Math.round(rangeDiff) };
        }

        function getEquivalentRange(targetDpm, modeKey, hmLevel, mainLvl, summonLvl, hasSE, hasSI) {
            if (modeKey.startsWith('bm_')) {
                const cfg = BM_MODES[modeKey];
                let mainDpm = targetDpm;
                
                if (cfg.hasPhoenix) {
                    const summonPct = getPhoenixPercent(summonLvl);
                    mainDpm -= Math.floor(221528 * (summonPct / 550));
                }
                if (mainDpm < 0) mainDpm = 0;
                
                const baseTargetDpm = 7321100; 
                
                const mainPct = getBmRfPercent(mainLvl);
                const scale = (mainDpm / baseTargetDpm) / (mainPct / 110);
                const targetAvg = scale * 5816; 
                return Math.round(targetAvg * (6407 / 5816));
            } 
            else if (modeKey.startsWith('cs_')) {
                const { currentMainBase, summonBase, skillPct } = getCorsairBaseDpm(modeKey, mainLvl, hmLevel);
                
                let effectiveMainBase = currentMainBase;
                if (hasSE) effectiveMainBase *= ((skillPct + 21) / skillPct); 
                if (hasSI && modeKey.includes('cannon')) effectiveMainBase *= 1.05; 
                
                const baseTotal = effectiveMainBase + summonBase;
                if (baseTotal === 0) return 0;

                const scale = targetDpm / baseTotal;
                const targetAvg = scale * CS_BASE_AVG;
                return Math.round(targetAvg * (6228 / 4828.5));
            }
            else if (modeKey.startsWith('hero_')) {
                const seMult = hasSE ? (260 + 21) / 260 : 1;
                let mainDpm = targetDpm;
                
                mainDpm /= seMult; 
                if (hasSI) mainDpm /= 1.1905; 
                if (mainDpm < 0) mainDpm = 0;
                
                const scale = mainDpm / 5830720;
                const targetAvg = scale * HERO_BASE_AVG; 
                return Math.round(targetAvg * (8789 / HERO_BASE_AVG));
            }
            else if (modeKey.startsWith('nl_')) {
                let mainDpm = targetDpm;
                if (mainDpm < 0) mainDpm = 0;
                
                const seMult = hasSE ? (2.8933 / 1.8333) : 1;
                mainDpm /= seMult;
                
                const scale = mainDpm / 5656950;
                const targetAvg = scale * NL_BASE_AVG; 
                return Math.round(targetAvg * (5286 / 4114));
            }
            return 0;
        }

        function calculateDPM(modeKey, rawMin, rawMax, levelDiff, weaponAtt, hmLevel, mainLvl, summonLvl, hasSE, hasSI) {
            
            const { adjMin: min, adjMax: max, rangeDiff } = getAdjustedRange(rawMin, rawMax, modeKey, levelDiff, weaponAtt);
            const levelAdjNote = levelDiff !== 0 ? `<div style="color:#ffcc00; font-size:0.9em; margin-bottom:10px;">(已套用等級差 ${levelDiff > 0 ? '+'+levelDiff : levelDiff}：面板調節 ${min} ~ ${max})</div>` : '';

            if (modeKey.startsWith('cs_')) {
                const inputAvg = (min + max) / 2;
                const scale = inputAvg / CS_BASE_AVG; 
                
                const { currentMainBase, summonBase, skillPct, mainBase } = getCorsairBaseDpm(modeKey, mainLvl, hmLevel);
                
                const isCannon = modeKey.includes('cannon');
                const seMult = hasSE ? (skillPct + 21) / skillPct : 1;
                const siMult = (hasSI && isCannon) ? 1.05 : 1; 

                const sePctDisplay = hasSE ? ((seMult - 1) * 100).toFixed(1) : 0;
                const seTag = hasSE ? `<span class="sub-text" style="color:#ffcc00; margin-left:5px;">[會心加成 +${sePctDisplay}%]</span>` : '';
                
                let siTag = '';
                if (hasSI) {
                    siTag = isCannon ? `<span class="sub-text" style="color:#4db8ff; margin-left:5px;">[極速 +5.0%]</span>` 
                                     : `<span class="sub-text" style="color:#aaa; margin-left:5px;">(不受極速影響)</span>`;
                }

                const isHm = modeKey.includes('hm');
                let detailName = CS_NAMES[modeKey];
                
                if (isHm) {
                    hmLevel = Math.max(1, Math.min(20, hmLevel || 20));
                    detailName = detailName.replace('精準目標', `精準(${hmLevel}等)`);
                }

                const mainDpm = Math.floor(currentMainBase * scale * seMult * siMult);
                const summonDpm = Math.floor(summonBase * scale);
                const totalDpm = mainDpm + summonDpm;
                const mainDps = Math.floor(mainDpm / 60);

                let detailHtml = levelAdjNote + `<p>主技能 DPS (秒輸出)：${mainDps.toLocaleString()}</p>`;
                
                if (isHm) {
                    const scaledMainBase = Math.floor(mainBase * scale * seMult * siMult);
                    const scaledBonus = mainDpm - scaledMainBase;
                    detailHtml += `<p>主技能 DPM：${mainDpm.toLocaleString()} <span style="font-size:0.9em; color:#aaa;">(${scaledMainBase.toLocaleString()}+精準等級[${scaledBonus.toLocaleString()}])</span> <br><span class="sub-text" style="color:#ffcc00; display:inline-block; margin-top:4px;">[Lv.${mainLvl} 技能倍率: ${skillPct}%]</span>${seTag}${siTag}</p>`;
                } else {
                    detailHtml += `<p>主技能 DPM：${mainDpm.toLocaleString()} <span class="sub-text" style="color:#ffcc00; margin-left:5px;">[Lv.${mainLvl} 技能倍率: ${skillPct}%]</span>${seTag}${siTag}</p>`;
                }

                if (summonDpm > 0) {
                    detailHtml += `<p>章魚群 DPM：${summonDpm.toLocaleString()} <span class="sub-text" style="color:#888;">(召喚物不受會心影響)</span></p>`;
                }

                return {
                    name: detailName,
                    totalDpm: totalDpm,
                    adjMax: max,
                    html: detailHtml + `<p class="sub-text" style="margin-top:12px;">(按當前面板比例動態精算)</p>`
                };
            } 
            else if (modeKey.startsWith('bm_')) {
                const cfg = BM_MODES[modeKey];
                const inputAvg = (min + max) / 2;
                const scale = inputAvg / 5816; 

                const mainPct = getBmRfPercent(mainLvl);
                const mainBaseDpm = 7321100; 
                
                const mainDpm = Math.floor(mainBaseDpm * scale * (mainPct / 110));
                const avgHit = Math.floor(14642.2 * scale * (mainPct / 110));
                const dps = Math.floor(mainDpm / 60);
                
                let summonDpm = 0;
                let summonPct = 0;
                if (cfg.hasPhoenix) {
                    summonPct = getPhoenixPercent(summonLvl);
                    summonDpm = Math.floor(221528 * (summonPct / 550));
                }
                const totalDpm = mainDpm + summonDpm;
                
                const bmSeNote = `<span class="sub-text" style="color:#ffcc00; margin-left:5px;">[內建會心 +63.8%]</span>`;
                const bmSiNote = hasSI ? `<span class="sub-text" style="color:#aaa; margin-left:5px;">(不受極速影響)</span>` : '';

                let detailHtml = levelAdjNote + `
                    <p>單段平均傷害：${avgHit.toLocaleString()}</p>
                    <p>主技能 DPS (秒輸出)：${dps.toLocaleString()}</p>
                    <p>主技能 DPM：${mainDpm.toLocaleString()} <span class="sub-text" style="color:#ffcc00; margin-left:5px;">[Lv.${mainLvl} 倍率: ${mainPct}%]</span>${bmSeNote}${bmSiNote}</p>
                `;
                if (cfg.hasPhoenix) {
                    detailHtml += `<p>鳳凰 DPM：${summonDpm.toLocaleString()} <span class="sub-text" style="color:#ffcc00; margin-left:5px;">[Lv.${summonLvl} 倍率: ${summonPct}%]</span></p>`;
                }

                return {
                    name: cfg.name,
                    totalDpm: totalDpm,
                    adjMax: max,
                    html: detailHtml + `<p class="sub-text" style="margin-top:12px;">(按當前面板比例動態精算)</p>`
                };
            }
            else if (modeKey.startsWith('hero_')) {
                const inputAvg = (min + max) / 2;
                const scale = inputAvg / HERO_BASE_AVG; 

                const seMult = hasSE ? (260 + 21) / 260 : 1;
                const sePctDisplay = hasSE ? ((seMult - 1) * 100).toFixed(1) : 0;
                const seTag = hasSE ? `<span class="sub-text" style="color:#ffcc00; margin-left:5px;">[會心加成 +${sePctDisplay}%]</span>` : '';
                
                const siMult = hasSI ? 1.1905 : 1;
                const siTag = hasSI ? `<span class="sub-text" style="color:#4db8ff; margin-left:5px;">[極速 +19.1%]</span>` : '';

                const mainBaseDpm = 5830720;
                const mainDpm = Math.floor(mainBaseDpm * scale * seMult * siMult);
                
                const baseAvgHit = 36442;
                const avgHit = Math.floor(baseAvgHit * scale * seMult); 
                const dps = Math.round(mainDpm / 60);
                
                const totalDpm = mainDpm;

                let detailHtml = levelAdjNote + `
                    <p>單段平均傷害：${avgHit.toLocaleString()}</p>
                    <p>主技能 DPS (秒輸出)：${dps.toLocaleString()}</p>
                    <p>主技能 DPM：${mainDpm.toLocaleString()} <br><span style="display:inline-block; margin-top:4px;">${hasSE ? seTag : ''}${hasSI ? siTag : ''}</span></p>
                `;

                return {
                    name: "無雙劍舞30 260% + 進階鬥氣滿215%",
                    totalDpm: totalDpm,
                    adjMax: max,
                    html: detailHtml + `<p class="sub-text" style="margin-top:12px;">(按當前面板比例動態精算)</p>`
                };
            }
            else if (modeKey.startsWith('nl_')) {
                const inputAvg = (min + max) / 2;
                const scale = inputAvg / NL_BASE_AVG; 
                
                const seMult = hasSE ? (2.8933 / 1.8333) : 1;
                
                const mainBaseDpm = 5656950;
                const mainDpm = Math.floor(mainBaseDpm * scale * seMult);
                
                const baseSingleStar = 12571;
                const singleStarHit = Math.floor(baseSingleStar * scale * seMult);
                const totalHitPerAttack = Math.floor(singleStarHit * 4.5); 
                
                const dps = Math.floor(mainDpm / 60);
                const totalDpm = mainDpm;

                const sePctDisplay = hasSE ? ((seMult - 1) * 100).toFixed(1) : 0;
                const seTag = hasSE ? `<span class="sub-text" style="color:#ffcc00; margin-left:5px;">[會心加成 +${sePctDisplay}%]</span>` : '';
                const siTag = hasSI ? `<span class="sub-text" style="color:#aaa; margin-left:5px;">(不受極速影響)</span>` : '';

                let detailHtml = levelAdjNote + `
                    <p>單發飛鏢均傷：${singleStarHit.toLocaleString()} <span class="sub-text" style="color:#aaa;">(不含影分身)</span></p>
                    <p>單次出手總傷：${totalHitPerAttack.toLocaleString()} <span class="sub-text" style="color:#aaa;">(3發鏢 + 影分身)</span></p>
                    <p>主技能 DPS (秒輸出)：${dps.toLocaleString()}</p>
                    <p>主技能 DPM：${mainDpm.toLocaleString()} <br><span style="display:inline-block; margin-top:4px;">${hasSE ? seTag : ''}${hasSI ? siTag : ''}</span></p>
                `;

                return {
                    name: "三飛閃20 + 影分身 + 無形鏢",
                    totalDpm: totalDpm,
                    adjMax: max,
                    html: detailHtml + `<p class="sub-text" style="margin-top:12px;">(按當前面板比例動態精算，已自帶 5.26 係數及扣防預設)</p>`
                };
            }
        }

        let chartInstance = null;

        function executeCalculation() {
            const p1Mode = document.getElementById('p1Mode').value;
            const p1Min = Number(document.getElementById('p1Min').value);
            const p1Max = Number(document.getElementById('p1Max').value);
            const p1LevelDiff = Number(document.getElementById('p1LevelDiff').value) || 0;
            const p1WeaponAtt = Number(document.getElementById('p1WeaponAtt').value) || 0;
            const p1MainLvl = Number(document.getElementById('p1MainLvl').value) || 30;
            const p1SummonLvl = Number(document.getElementById('p1SummonLvl').value) || 30;
            const p1SE = document.getElementById('p1SE').checked;
            const p1SI = document.getElementById('p1SI').checked;
            const p1Result = calculateDPM(p1Mode, p1Min, p1Max, p1LevelDiff, p1WeaponAtt, p1HmLevel, p1MainLvl, p1SummonLvl, p1SE, p1SI);

            const p2Mode = document.getElementById('p2Mode').value;
            const p2Min = Number(document.getElementById('p2Min').value);
            const p2Max = Number(document.getElementById('p2Max').value);
            const p2LevelDiff = Number(document.getElementById('p2LevelDiff').value) || 0;
            const p2WeaponAtt = Number(document.getElementById('p2WeaponAtt').value) || 0;
            const p2MainLvl = Number(document.getElementById('p2MainLvl').value) || 30;
            const p2SummonLvl = Number(document.getElementById('p2SummonLvl').value) || 30;
            const p2SE = document.getElementById('p2SE').checked;
            const p2SI = document.getElementById('p2SI').checked;
            const p2Result = calculateDPM(p2Mode, p2Min, p2Max, p2LevelDiff, p2WeaponAtt, p2HmLevel, p2MainLvl, p2SummonLvl, p2SE, p2SI);

            document.getElementById('p1Detail').innerHTML = `
                <h4>[玩家 A] ${p1Result.name}</h4>
                ${p1Result.html}
                <hr style="border-color:#444; margin:10px 0;">
                <p>總合 DPM：<span class="highlight">${p1Result.totalDpm.toLocaleString()}</span></p>
            `;

            document.getElementById('p2Detail').innerHTML = `
                <h4>[玩家 B] ${p2Result.name}</h4>
                ${p2Result.html}
                <hr style="border-color:#444; margin:10px 0;">
                <p>總合 DPM：<span class="highlight">${p2Result.totalDpm.toLocaleString()}</span></p>
            `;

            const diff = p2Result.totalDpm - p1Result.totalDpm;
            const pct = (Math.abs(diff) / p1Result.totalDpm * 100).toFixed(2);
            let diffHtml = "";

            if (diff > 0) {
                diffHtml = `玩家 B 高出 <span class="lose">${diff.toLocaleString()}</span> (贏 ${pct}%)`;
            } else if (diff < 0) {
                diffHtml = `玩家 A 高出 <span class="win">${Math.abs(diff).toLocaleString()}</span> (贏 ${pct}%)`;
            } else {
                diffHtml = "雙方輸出完全一致！";
            }
            
            document.getElementById('diffText').innerHTML = `<strong>【輸出差距比對】</strong><br>${diffHtml}`;
            
            const getClassName = (mode) => {
                if (mode.startsWith('cs_')) return '槍神';
                if (mode.startsWith('bm_')) return '箭神';
                if (mode.startsWith('hero_')) return '英雄';
                if (mode.startsWith('nl_')) return '夜使者';
                return '未知';
            };

            const classNameA = getClassName(p1Mode);
            const classNameB = getClassName(p2Mode);
            
            let eqHtml = `<h4 style="margin:0 0 10px 0; color:#fff;">🎯 等效大表追趕需求</h4>`;
            let showEqBox = false;

            if (diff > 0) {
                const eqA = getEquivalentRange(p2Result.totalDpm, p1Mode, p1HmLevel, p1MainLvl, p1SummonLvl, p1SE, p1SI);
                const gap = eqA - p1Result.adjMax; 
                eqHtml += `<p>要達到 玩家 B (${classNameB}) 的總輸出，玩家 A (${classNameA}) 大表約需撐到：<span class="eq-val">${eqA.toLocaleString()}</span></p>`;
                if (gap > 0) {
                    eqHtml += `<p class="gap-val">(距離當前調節後大表還差：<strong>${gap.toLocaleString()}</strong>)</p>`;
                }
                showEqBox = true;
            } else if (diff < 0) {
                const eqB = getEquivalentRange(p1Result.totalDpm, p2Mode, p2HmLevel, p2MainLvl, p2SummonLvl, p2SE, p2SI);
                const gap = eqB - p2Result.adjMax; 
                eqHtml += `<p>要達到 玩家 A (${classNameA}) 的總輸出，玩家 B (${classNameB}) 大表約需撐到：<span class="eq-val">${eqB.toLocaleString()}</span></p>`;
                if (gap > 0) {
                    eqHtml += `<p class="gap-val">(距離當前調節後大表還差：<strong>${gap.toLocaleString()}</strong>)</p>`;
                }
                showEqBox = true;
            }

            const equivBoxEl = document.getElementById('equivBox');
            if (showEqBox) {
                equivBoxEl.innerHTML = eqHtml;
                equivBoxEl.style.display = 'block';
            } else {
                equivBoxEl.style.display = 'none'; 
            }

            const ctx = document.getElementById('dpmChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['總合實戰 DPM'],
                    datasets: [
                        { label: `玩家 A (${p1Result.name})`, data: [p1Result.totalDpm], backgroundColor: 'rgba(77, 184, 255, 0.8)', borderColor: 'rgba(77, 184, 255, 1)', borderWidth: 1 },
                        { label: `玩家 B (${p2Result.name})`, data: [p2Result.totalDpm], backgroundColor: 'rgba(255, 77, 77, 0.8)', borderColor: 'rgba(255, 77, 77, 1)', borderWidth: 1 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    animation: { duration: 400 }, 
                    plugins: { legend: { labels: { color: '#fff', font: { size: 14 } } } },
                    scales: {
                        y: { ticks: { color: '#ccc' }, grid: { color: '#444' }, beginAtZero: true },
                        x: { ticks: { color: '#ccc', font: { size: 14 } }, grid: { display: false } }
                    }
                }
            });
            
            document.getElementById('resultPanel').classList.add('active');
        }

        window.onload = function() {
            updateVisibility('p1');
            updateVisibility('p2');
            executeCalculation();
        };
    </script>
</body>
</html>
